name: Build and Deploy Desktop App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        run: |
          cd apps/desktop
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SERVER_SSH_KEY }}
          known_hosts: "unnecessary_with_strict_checking_off" # Handled by scp flags
          if_key_exists: replace

      - name: Deploy to DigitalOcean
        shell: pwsh
        run: |
          # Upload using native scp (the key is now in the default ssh location)
          scp -o StrictHostKeyChecking=no -r apps/desktop/release/* root@159.65.84.190:/var/www/downloads/desktop/
