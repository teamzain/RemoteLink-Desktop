name: Build and Deploy Desktop App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        run: |
          cd apps/desktop
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to DigitalOcean
        shell: pwsh
        run: |
          # Create a temporary file for the SSH key
          $keyFile = [System.IO.Path]::GetTempFileName()
          # Use ASCII encoding to avoid BOM/formatting issues that break SSH keys
          $env:SSH_KEY = "${{ secrets.SERVER_SSH_KEY }}"
          $env:SSH_KEY | Out-File -FilePath $keyFile -Encoding ASCII
          
          # Set permissions (required for SSH)
          icacls $keyFile /inheritance:r
          icacls $keyFile /grant:r "${env:USERNAME}:(R)"
          
          # Upload using native scp
          scp -i $keyFile -o StrictHostKeyChecking=no -r apps/desktop/release/* root@159.65.84.190:/var/www/downloads/desktop/
          
          # Clean up
          Remove-Item $keyFile
