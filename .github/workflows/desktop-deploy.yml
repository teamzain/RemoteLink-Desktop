name: Build and Deploy Desktop App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - 'packages/**'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop App
        run: |
          cd apps/desktop
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to DigitalOcean
        uses: appleboy/scp-action@master
        with:
          host: 159.65.84.190
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }} # Only if your key has a password
          source: "apps/desktop/release/*"
          target: "/var/www/downloads/desktop/"
          strip_components: 3
          overwrite: true
