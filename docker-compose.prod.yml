version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-remotelink}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-remotelink}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remotelink"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Backend Services
  auth-service:
    build: 
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  signaling-service:
    build:
      context: .
      dockerfile: ./apps/signaling-service/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      PORT: 3002
    depends_on:
      - postgres
      - redis

  session-service:
    build:
      context: .
      dockerfile: ./apps/session-service/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      PORT: 3003
    depends_on:
      - postgres

  billing-service:
    build:
      context: .
      dockerfile: ./apps/billing-service/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PORT: 3004
    depends_on:
      - postgres

  # TURN Server
  coturn:
    image: coturn/coturn:latest
    restart: always
    network_mode: "host"
    command: >
      -n --log-file=stdout --min-port=49152 --max-port=65535
      --realm=${TURN_REALM:-remotelink.local}
      --user=${TURN_USER}:${TURN_PASSWORD}
      --external-ip=${SERVER_IP}

  # Reverse Proxy
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - auth-service
      - signaling-service
      - session-service
      - billing-service

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
