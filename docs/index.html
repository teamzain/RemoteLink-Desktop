<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RemoteLink — Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0B0E23;
      --grad:      linear-gradient(153.01deg, #00F0FF 12.03%, #0066FF 101%);
      --grad-text: linear-gradient(91.74deg, #FFFFFF 7.74%, #427DD5 101.07%);
      --cyan:      #00F0FF;
      --text:      #FFFFFF;
      --muted:     rgba(255,255,255,0.45);
      --card:      linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.035) 100%);
      --border:    rgba(255,255,255,0.07);
      --font:      'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    #prev-wrap, .card-wrap, .divider { flex-shrink: 0; }

    footer { margin-top: auto; }

    /* Central glow */
    .glow {
      position: fixed;
      width: 360px; height: 320px;
      left: calc(50% - 180px);
      top: calc(50% - 240px);
      background: var(--grad);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }

    /* Nav — logo only */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      padding: 36px 24px 0;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav-logo img {
      width: 44px; height: 44px;
      border-radius: 12px;
      object-fit: cover;
    }
    .nav-logo-name {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.02em; color: var(--text);
    }

    /* Hero — centered, minimal */
    .hero {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      text-align: center;
      padding: 56px 24px 0;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500; color: var(--muted);
      letter-spacing: 0.02em;
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    .hero-title {
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 800px;
    }

    /* Download button */
    .btn-wrap { position: relative; margin-top: 4px; }
    .btn-glow {
      position: absolute; inset: -8px;
      background: radial-gradient(ellipse at center, rgba(0,102,255,0.5) 0%, transparent 70%);
      filter: blur(16px); border-radius: 20px; pointer-events: none;
    }
    .btn-dl {
      position: relative;
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--grad); color: #fff;
      font-family: var(--font); font-size: 17px; font-weight: 600;
      padding: 15px 44px; border-radius: 12px; border: none;
      cursor: pointer; text-decoration: none;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn-dl:hover { opacity: .88; color: #fff; transform: translateY(-1px); }
    .btn-dl:active { transform: translateY(0); }

    /* Meta row */
    .meta-row {
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap; justify-content: center;
      font-size: 13px; color: var(--muted);
    }
    .vtag {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px; padding: 3px 12px;
      font-size: 12px; font-weight: 600; color: var(--text);
    }
    .hash-val {
      font-family: 'Courier New', monospace;
      font-size: 11.5px; color: var(--muted);
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 6px; padding: 3px 9px;
      cursor: pointer; letter-spacing: .03em;
      transition: color .15s, border-color .15s;
    }
    .hash-val:hover { color: var(--cyan); border-color: rgba(0,240,255,.3); }
    .hash-val.copied { color: var(--cyan); border-color: rgba(0,240,255,.45); }

    /* Detail card */
    .card-wrap {
      position: relative; z-index: 1;
      max-width: 640px; width: 100%;
      margin: 44px auto 0; padding: 0 24px;
    }
    .dl-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .dl-card-platform {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .dl-card-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .dl-card-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .dl-card-date { font-size: 12px; color: var(--muted); flex-shrink: 0; }

    /* Divider */
    .divider {
      position: relative; z-index: 1;
      max-width: 640px; margin: 36px auto 0;
      border: none; border-top: 1px solid var(--border);
    }

    /* Previous releases */
    .prev-wrap {
      position: relative; z-index: 1;
      max-width: 640px; margin: 0 auto;
      padding: 28px 24px 72px;
    }
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .rel-list { display: grid; gap: 7px; }
    .rel-card {
      background: linear-gradient(180deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
      transition: border-color .15s;
    }
    .rel-card:hover { border-color: rgba(255,255,255,.12); }
    .rel-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; cursor: pointer; user-select: none;
    }
    .rel-hdr-l { display: flex; align-items: center; gap: 10px; }
    .rel-ver { font-size: .9rem; font-weight: 700; }
    .rel-date { font-size: .77rem; color: var(--muted); }
    .chevron { color: var(--muted); transition: transform .2s; }
    .rel-card.open .chevron { transform: rotate(180deg); }
    .rel-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
    .rel-card.open .rel-body { display: block; }
    .rel-notes { font-size: .85rem; color: var(--muted); padding: 10px 0 12px; }
    .asset-grid { display: grid; gap: 6px; }
    .asset-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 8px 12px; background: rgba(255,255,255,.03);
      border: 1px solid var(--border); border-radius: 9px;
      text-decoration: none; color: inherit; transition: border-color .15s;
    }
    a.asset-row:hover { border-color: rgba(0,240,255,.22); }
    .asset-l { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .asset-name { font-size: .83rem; color: var(--muted); word-break: break-all; }
    a.asset-row .asset-name { color: var(--cyan); }
    .asset-r { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .asset-sz { font-size: .76rem; color: var(--muted); white-space: nowrap; }
    .asset-hash { font-family: 'Courier New', monospace; font-size: 10px; color: var(--muted); cursor: pointer; transition: color .15s; }
    .asset-hash:hover, .asset-hash.copied { color: var(--cyan); }

    /* States */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
    .skel {
      background: linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 10px;
    }

    /* Footer */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      text-align: center; padding: 20px;
      font-size: 12px; color: var(--muted);
    }

    @media (max-width: 560px) {
      .hero { padding: 44px 16px 0; }
      .btn-dl { font-size: 15px; padding: 13px 32px; }
      .card-wrap, .prev-wrap { padding-left: 16px; padding-right: 16px; }
      .dl-card { padding: 18px 20px; }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<nav>
  <a class="nav-logo" href="#">
    <img src="./logo.png" alt="RemoteLink" />
    <span class="nav-logo-name">RemoteLink</span>
  </a>
</nav>

<section class="hero" id="hero">
  <div class="skel" style="height:16px;width:140px;border-radius:999px;"></div>
  <div class="skel" style="height:72px;width:520px;max-width:88vw;border-radius:12px;margin-top:4px;"></div>
  <div class="skel" style="height:52px;width:220px;border-radius:12px;margin-top:4px;"></div>
</section>

<div class="card-wrap" id="card-wrap" hidden>
  <div class="dl-card" id="dl-card"></div>
</div>

<hr class="divider" id="divider" hidden />
<div class="prev-wrap" id="prev-wrap" hidden></div>

<footer id="footer" hidden>
  © <span id="yr"></span> RemoteLink
</footer>

<script>
"use strict";

function fmtDate(iso){const d=new Date(iso);return isNaN(d)?(iso||''):d.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});}
function fmtSize(b){if(typeof b!=='number'||b<0)return '';const u=['B','KB','MB','GB'];let i=0,n=b;while(n>=1024&&i<u.length-1){n/=1024;i++;}return `${n.toFixed(i===0?0:1)} ${u[i]}`;}
function trunc(h){return h?h.slice(0,16)+'…':'';}
async function doCopy(text,el,prev){try{await navigator.clipboard.writeText(text);}catch{return;}el.textContent='Copied!';el.classList.add('copied');setTimeout(()=>{el.textContent=prev;el.classList.remove('copied');},1800);}
function userAssets(a){return(a||[]).filter(x=>!x.name.endsWith('.blockmap')&&x.name!=='latest.yml');}
function primary(a){const u=userAssets(a);return u.find(x=>x.name.endsWith('.exe'))||u[0]||null;}

const WIN=`<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M0 2.25 6.5 1.4v5.6H0V2.25zM7.2 1.3 16 0v7H7.2V1.3zM0 7.7h6.5V13.7L0 12.8V7.7zM7.2 7.7H16V16L7.2 14.7V7.7z"/></svg>`;
const DL=`<svg width="17" height="17" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3v10M6 9l4 4 4-4"/><path d="M3 16h14"/></svg>`;
const CHV=`<svg class="chevron" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>`;

function renderHero(r){
  const p=primary(r.assets);
  const el=document.getElementById('hero');
  el.innerHTML='';

  const badge=document.createElement('div');
  badge.className='hero-badge';
  badge.innerHTML=`<span class="badge-dot"></span> v${r.version||'?'} &nbsp;·&nbsp; ${fmtDate(r.publishedAt)}`;
  el.appendChild(badge);

  const title=document.createElement('h1');
  title.className='hero-title';
  title.textContent='Remote Desktop Access, Reimagined.';
  el.appendChild(title);

  if(p){
    const wrap=document.createElement('div');
    wrap.className='btn-wrap';
    wrap.innerHTML='<div class="btn-glow"></div>';
    const btn=document.createElement('a');
    btn.className='btn-dl';
    btn.href=p.url; btn.target='_blank'; btn.rel='noopener';
    btn.innerHTML=`${DL} Download for Windows`;
    wrap.appendChild(btn);
    el.appendChild(wrap);
  }

  const meta=document.createElement('div');
  meta.className='meta-row';
  const vt=document.createElement('span');
  vt.className='vtag'; vt.textContent=`v${r.version||'?'}`;
  meta.appendChild(vt);

  if(p&&p.sha256){
    const lbl=document.createElement('span');lbl.textContent='SHA-256';
    const hv=document.createElement('code');
    hv.className='hash-val';
    const t=trunc(p.sha256);hv.textContent=t;hv.title='Click to copy';
    hv.addEventListener('click',()=>doCopy(p.sha256,hv,t));
    meta.append(lbl,hv);
  }
  el.appendChild(meta);
}

function renderCard(r){
  const p=primary(r.assets);
  if(!p)return;
  document.getElementById('dl-card').innerHTML=`
    <div>
      <div class="dl-card-platform">${WIN} Windows x64</div>
      <div class="dl-card-name">${p.name}</div>
      <div class="dl-card-meta">${fmtSize(p.size)}</div>
    </div>
    <div class="dl-card-date">${fmtDate(r.publishedAt)}</div>
  `;
  document.getElementById('card-wrap').hidden=false;
}

function renderOlder(releases){
  const wrap=document.getElementById('prev-wrap');
  wrap.innerHTML=`<p class="sec-label">Previous Releases</p>`;
  const list=document.createElement('div');
  list.className='rel-list';
  releases.forEach(r=>{
    const ua=userAssets(r.assets);
    const card=document.createElement('article');
    card.className='rel-card';
    const hdr=document.createElement('div');
    hdr.className='rel-hdr';
    hdr.innerHTML=`<div class="rel-hdr-l"><span class="rel-ver">v${r.version||'?'}</span><span class="rel-date">${fmtDate(r.publishedAt)}</span></div>${CHV}`;
    hdr.addEventListener('click',()=>card.classList.toggle('open'));
    card.appendChild(hdr);
    const body=document.createElement('div');
    body.className='rel-body';
    if(r.notes)body.innerHTML=`<p class="rel-notes">${r.notes}</p>`;
    const grid=document.createElement('div');
    grid.className='asset-grid';
    ua.forEach(asset=>{
      const isExe=asset.name.endsWith('.exe');
      const row=document.createElement(isExe?'a':'div');
      row.className='asset-row';
      if(isExe){row.href=asset.url;row.target='_blank';row.rel='noopener';}
      const ht=asset.sha256?trunc(asset.sha256):'';
      row.innerHTML=`<div class="asset-l"><span class="asset-name">${asset.name}</span>${asset.sha256?`<span class="asset-hash">${ht}</span>`:''}</div><div class="asset-r"><span class="asset-sz">${fmtSize(asset.size)}</span>${isExe?`<svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:#00F0FF"><path d="M10 3v10M6 9l4 4 4-4"/><path d="M3 16h14"/></svg>`:''}</div>`;
      if(asset.sha256){const hEl=row.querySelector('.asset-hash');hEl.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();doCopy(asset.sha256,hEl,ht);});}
      grid.appendChild(row);
    });
    body.appendChild(grid);
    card.appendChild(body);
    list.appendChild(card);
  });
  wrap.appendChild(list);
  wrap.hidden=false;
}

async function boot(){
  document.getElementById('yr').textContent=new Date().getFullYear();
  let data;
  try{
    const res=await fetch('./releases.json',{cache:'no-store'});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    data=await res.json();
  }catch(e){
    document.getElementById('hero').innerHTML=`<div class="empty">Could not load releases.<br><small>${e.message}</small></div>`;
    return;
  }
  const releases=Array.isArray(data.releases)?data.releases:[];
  if(!releases.length){document.getElementById('hero').innerHTML=`<div class="empty">No releases yet.</div>`;return;}
  const[latest,...older]=releases;
  renderHero(latest);
  renderCard(latest);
  if(older.length){document.getElementById('divider').hidden=false;renderOlder(older);}
  document.getElementById('footer').hidden=false;
}

boot();
</script>
</body>
</html>
